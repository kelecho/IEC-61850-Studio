name: Installers

# Instaladores de la app de escritorio (Tauri) por sistema operativo:
#  - Linux:   .deb / .rpm — la post-instalación aplica setcap CAP_NET_RAW al
#             binario, así los monitores GOOSE/SV (capa 2) funcionan sin root.
#  - Windows: instalador NSIS (.exe) — MMS/TCP completo; la capa 2 GOOSE/SV
#             usa Npcap (wpcap.dll en runtime), que el usuario instala aparte.
#  - macOS:   .dmg — MMS/TCP completo; sin backend de capa 2.
# Se lanza a mano (workflow_dispatch) o al empujar un tag v*; con tag, los
# instaladores se adjuntan a la GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: deb,rpm
            path: |
              target/release/bundle/deb/*.deb
              target/release/bundle/rpm/*.rpm
          - os: windows-latest
            bundles: nsis
            path: target/release/bundle/nsis/*.exe
          - os: macos-latest
            bundles: dmg
            path: target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    # A nivel de job para poder comprobarlo en el `if` del paso de firma
    # (el contexto `secrets` no está disponible en las condiciones `if`).
    env:
      WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
      WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Dependencias de sistema (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          # package.json (con packageManager) no está en la raíz del repo.
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/iec61850-tauri/pnpm-lock.yaml

      - name: Instalar dependencias del frontend
        working-directory: apps/iec61850-tauri
        run: pnpm install --frozen-lockfile

      - name: Construir instalador
        working-directory: apps/iec61850-tauri
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      # Firma Authenticode del instalador NSIS. Solo se ejecuta si el repo tiene
      # configurados los secretos WINDOWS_PFX_BASE64 (certificado .pfx en base64)
      # y WINDOWS_PFX_PASSWORD; sin ellos, el build sale sin firmar (funciona
      # igual, pero Windows SmartScreen avisa "editor desconocido"). Firma con
      # signtool del SDK de Windows (ya presente en el runner) y sella el tiempo.
      - name: Firmar el instalador (Windows, si hay certificado)
        if: runner.os == 'Windows' && env.WINDOWS_PFX_BASE64 != ''
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          Get-ChildItem target/release/bundle/nsis/*.exe | ForEach-Object {
            & $signtool.FullName sign /f $pfx /p $env:WINDOWS_PFX_PASSWORD `
              /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $_.FullName
          }
          Remove-Item $pfx -Force

      - uses: actions/upload-artifact@v4
        with:
          name: iec61850-tauri-${{ matrix.os }}
          path: ${{ matrix.path }}

      - name: Adjuntar a la release (solo tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.path }}
